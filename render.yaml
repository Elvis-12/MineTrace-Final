services:
  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  - type: web
    name: minetrace-backend
    runtime: java
    rootDir: minetrace backend/minetrace
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minetrace-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: minetrace-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: minetrace-db
          property: password
      - key: ML_SERVICE_URL
        value: https://minetrace-ml.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://minetrace-frontend.onrender.com
      - key: SERVER_PORT
        value: "8082"

  # ── Python ML / Fraud Detection ──────────────────────────────────────────────
  - type: web
    name: minetrace-ml
    runtime: python
    rootDir: fraud-detection
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: minetrace-frontend
    runtime: static
    rootDir: minetrace frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://minetrace-backend.onrender.com
      - key: VITE_APP_URL
        value: https://minetrace-frontend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: minetrace-db
    databaseName: minetrace_db
    user: minetrace_user
    plan: free
