services:
  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  - type: web
    name: minetrace-backend
    runtime: java
    plan: free
    buildCommand: cd minetrace-backend/minetrace && mvn clean package -DskipTests
    startCommand: java -jar minetrace-backend/minetrace/target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: minetrace-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: minetrace-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: minetrace-db
          property: password
      - key: ML_SERVICE_URL
        value: https://minetrace-ml.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://minetrace-one.vercel.app

  # ── Python ML / Fraud Detection ──────────────────────────────────────────────
  - type: web
    name: minetrace-ml
    runtime: python
    plan: free
    buildCommand: cd fraud-detection && pip install -r requirements.txt
    startCommand: cd fraud-detection && uvicorn main:app --host 0.0.0.0 --port $PORT

databases:
  - name: minetrace-db
    databaseName: minetrace_db
    user: minetrace_user
    plan: free
