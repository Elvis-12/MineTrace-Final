spring.application.name=minetrace

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/minetrace_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8082

# JWT Configuration
jwt.secret=bWluZXRyYWNlc2VjcmV0a2V5Zm9yandiZWFyZXJ0b2tlbjIwMjQ=
jwt.expiration=86400000

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://192.168.1.73:3000,http://192.168.1.73:5173
